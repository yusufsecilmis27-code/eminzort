<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSİHUB</title>
<style>
    body {
        margin: 0;
        background: #0d0d0d;
        font-family: Arial, sans-serif;
        color: white;
    }

    /* NAVBAR */
    .navbar {
        display: flex;
        align-items: center;
        padding: 15px;
        background: #000;
    }

    .logo {
        font-size: 26px;
        font-weight: bold;
    }

    .logo span {
        background: orange;
        color: black;
        padding: 3px 8px;
        border-radius: 5px;
    }

    /* LAYOUT */
    .container {
        display: flex;
        flex-direction: column;
        padding: 15px;
    }

    /* VİDEO */
    video {
        width: 100%;
        border-radius: 10px;
    }

    /* BAŞLIK */
    h2 {
        margin-top: 10px;
    }

    .meta {
        color: gray;
        font-size: 14px;
    }

    /* ÖNERİLEN VİDEOLAR */
    .sidebar {
        margin-top: 20px;
    }

    .video-item {
        display: flex;
        margin-bottom: 10px;
        cursor: pointer;
    }

    .video-item img {
        width: 120px;
        border-radius: 5px;
        margin-right: 10px;
    }

    .video-item div {
        font-size: 14px;
    }

    /* DESKTOP */
    @media (min-width: 768px) {
        .container {
            flex-direction: row;
        }
        .main {
            flex: 3;
            margin-right: 20px;
        }
        .sidebar {
            flex: 1;
            margin-top: 0;
        }
    }

    /* 🔞 YAŞ DOĞRULAMA */
    #ageGate {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        backdrop-filter: blur(8px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .box {
        text-align: center;
        background: #111;
        padding: 30px;
        border-radius: 15px;
        max-width: 320px;
        width: 90%;
    }

    .box h1 {
        color: orange;
        margin: 0 0 10px 0;
        font-size: 42px;
    }

    .box p {
        color: #ccc;
        font-size: 14px;
        margin-bottom: 20px;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        background: orange;
        color: black;
        font-weight: bold;
    }

    button.no {
        background: #333;
        color: white;
    }
</style>
</head>
<body>

<div id="ageGate">
    <div class="box">
        <h1>18+</h1>
        <p>Bu siteye giriş yaparak 18 yaşından büyük olduğunuzu onaylıyorsunuz.</p>

        <button onclick="acceptAge()">Evet, 18+</button>
        <button class="no" onclick="denyAge()">Hayır</button>
    </div>
</div>

<div class="navbar">
    <div class="logo">Osi<span>Hub</span></div>
</div>

<div class="container">

    <div class="main">
        <video controls>
            <source src="eminzortporn.mp4" type="video/mp4">
        </video>

        <h2>ŞOK EDEN VİDEO 😱</h2>
        <div class="meta">1.2M görüntülenme • 2 gün önce</div>
    </div>

    <div class="sidebar">

        <div class="video-item">
            <img src="4.jpeg" alt="Video Thumbnail">
            <div>Deliksiz uyuyan güzelin deliklerini dağıttı.😳</div>
        </div>

        <div class="video-item">
            <img src="6.jpg.jpeg" alt="Video Thumbnail">
            <div>kaybetmek yerine ıstakaya oturmayı kabul etti.</div>
        </div>

        <div class="video-item">
            <img src="5.jpeg" alt="Video Thumbnail">
            <div>Sonu şok ediyor</div>
        </div>

    </div>

</div>

<script>
    // TEST MODU: Sen tasarımı denerken sayfa her yenilendiğinde hafızayı temizler.
    // DİKKAT: Siteyi gerçekten yayınlayacağın zaman bu satırı silmelisin!
    localStorage.removeItem("ageVerified");

    function acceptAge() {
        localStorage.setItem("ageVerified", "true");
        document.getElementById("ageGate").style.display = "none";
    }

    function denyAge() {
        alert("Bu siteye giriş yapamazsınız.");
        window.location.href = "https://google.com";
    }

    // Sayfa açılınca yaş kontrolü
    window.onload = function() {
        if(localStorage.getItem("ageVerified") === "true") {
            document.getElementById("ageGate").style.display = "none";
        }
    }
</script>

</body>
</html>
